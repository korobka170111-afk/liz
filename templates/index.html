<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Меняющийся текст</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1 id="main-text">Представь...</h1>
        <button id="change-btn">Сменить текст</button>
    </div>

    <script>
        const textElement = document.getElementById('main-text');
        const button = document.getElementById('change-btn');

        button.addEventListener('click', () => {
            fetch('/get_text')
                .then(response => response.json())
                .then(data => {
                    if (data.finished) {
                        // Тексты закончились — удаляем кнопку и показываем картинку
                        button.style.display = 'none';

                        // Создаём элемент с картинкой
                        const img = document.createElement('img');
                        img.src = '/static/img_1.png';
                        img.alt = 'финальная картинка';
                        img.style.maxWidth = '100%';
                        img.style.marginTop = '20px';

                        document.querySelector('.container').appendChild(img);
                    } else {
                        // Показываем следующий текст
                        textElement.textContent = data.text;
                    }
                })
                .catch(error => console.error('Ошибка:', error));
        });
    </script>
</body>
</html>
